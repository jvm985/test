<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test App - Backup & Restore</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; background: #f5f5f7; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        textarea { width: 100%; height: 150px; margin: 20px 0; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #0071e3; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        .status { margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>9-Test App</h1>
        <div id="g_id_onload"
             data-client_id="339058057860-i6ne31mqs27mqm2ulac7al9vi26pmgo1.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <div id="editor" style="display:none;">
            <p>Welkom, <span id="username"></span>!</p>
            <textarea id="content" placeholder="Typ hier je testdata..."></textarea>
            <button id="saveBtn" onclick="saveData()">Opslaan in Mongo</button>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('test_token');
        const API_URL = '/api';

        async function handleCredentialResponse(response) {
            const res = await fetch(`${API_URL}/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            });
            const data = await res.json();
            token = data.token;
            localStorage.setItem('test_token', token);
            showEditor(data.user);
        }

        function showEditor(user) {
            document.querySelector('.g_id_signin').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('username').innerText = user.name;
            loadData();
        }

        async function loadData() {
            const res = await fetch(`${API_URL}/data`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) return logout();
            const data = await res.json();
            document.getElementById('content').value = data.content;
            document.getElementById('status').innerText = `Laatst bewerkt door: ${data.lastModifiedBy || 'onbekend'}`;
        }

        async function saveData() {
            const content = document.getElementById('content').value;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            const res = await fetch(`${API_URL}/data`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content })
            });
            const data = await res.json();
            document.getElementById('status').innerText = 'Opgeslagen! (Check nu de backup/restore)';
            saveBtn.disabled = false;
        }

        function logout() {
            localStorage.removeItem('test_token');
            location.reload();
        }

        // Auto-login if token exists
        if (token) {
            // Decoden van JWT voor de naam (simpel)
            const payload = JSON.parse(atob(token.split('.')[1]));
            showEditor(payload);
        }
    </script>
</body>
</html>
