<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-Test App - Backup & Restore</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; background: #f5f5f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #333; margin-bottom: 30px; }
        textarea { width: 100%; height: 150px; margin: 20px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: #0071e3; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; }
        button:disabled { background: #ccc; }
        .status { margin-top: 15px; font-size: 14px; color: #666; border-top: 1px solid #eee; padding-top: 15px; }
        #editor { margin-top: 20px; }
        .login-container { display: flex; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>9-Test App</h1>
        
        <div id="login-section">
            <div id="g_id_onload"
                 data-client_id="339058057860-i6ne31mqs27mqm2ulac7al9vi26pmgo1.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="login-container">
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
        </div>

        <div id="editor" style="display:none;">
            <p>Welkom, <strong id="username"></strong>!</p>
            <textarea id="content" placeholder="Typ hier je testdata..."></textarea>
            <button id="saveBtn" onclick="saveData()">Opslaan in MongoDB</button>
            <div id="status" class="status"></div>
            <button onclick="logout()" style="background: none; color: #0071e3; margin-top: 20px; font-size: 14px;">Uitloggen</button>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('test_token');
        const API_URL = '/api';

        async function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            try {
                const res = await fetch(`${API_URL}/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                if (!res.ok) throw new Error('Login failed on server');
                const data = await res.json();
                token = data.token;
                localStorage.setItem('test_token', token);
                localStorage.setItem('test_user', JSON.stringify(data.user));
                showEditor(data.user);
            } catch (err) {
                alert("Login fout: " + err.message);
            }
        }

        function showEditor(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('username').innerText = user.name;
            loadData();
        }

        async function loadData() {
            const res = await fetch(`${API_URL}/data`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) return logout();
            const data = await res.json();
            document.getElementById('content').value = data.content || '';
            document.getElementById('status').innerText = `Laatst bewerkt door: ${data.lastModifiedBy || 'onbekend'}`;
        }

        async function saveData() {
            const content = document.getElementById('content').value;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            document.getElementById('status').innerText = 'Bezig met opslaan...';
            
            try {
                const res = await fetch(`${API_URL}/data`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content })
                });
                const data = await res.json();
                document.getElementById('status').innerText = '✅ Opgeslagen! (Klaar voor backup test)';
            } catch (err) {
                document.getElementById('status').innerText = '❌ Fout bij opslaan';
            } finally {
                saveBtn.disabled = false;
            }
        }

        function logout() {
            localStorage.removeItem('test_token');
            localStorage.removeItem('test_user');
            location.reload();
        }

        // Auto-login if token exists
        window.onload = function() {
            const savedUser = localStorage.getItem('test_user');
            if (token && savedUser) {
                showEditor(JSON.parse(savedUser));
            }
        };
    </script>
</body>
</html>
